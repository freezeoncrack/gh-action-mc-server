name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:

      # ===================== CHECKOUT =====================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===================== FULL SYSTEM LOG =====================
      - name: System Debug (FULL OUTPUT)
        run: |
          echo "================ SYSTEM INFO ================"
          uname -a
          free -h
          df -h
          echo "============================================="

      # ===================== JAVA =====================
      - name: Install Java
        run: |
          sudo apt update
          sudo apt install -y openjdk-21-jre

          echo "================ JAVA VERSION ================"
          java -version
          echo "============================================="

      # ===================== PLAYIT INSTALL =====================
      - name: Install Playit.gg
        run: |
          sudo apt update
          sudo apt install -y curl gnupg

          curl -SsL https://playit-cloud.github.io/ppa/key.gpg \
            | gpg --dearmor \
            | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null

          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" \
            | sudo tee /etc/apt/sources.list.d/playit-cloud.list

          sudo apt update
          sudo apt install -y playit

          echo "PLAYIT INSTALLED OK"

      # ===================== START PLAYIT (REAL SYSTEMD LOGGING) =====================
      - name: Start Playit + Capture ALL Logs
        run: |
          echo "================ STARTING PLAYIT ================"

          sudo systemctl enable playit || true
          sudo systemctl restart playit

          sleep 5

          systemctl status playit --no-pager || true

          # FULL LIVE LOG MIRROR
          sudo journalctl -fu playit --no-pager > playit.log 2>&1 &
          LOGPID=$!

          echo "Watching Playit logs..."

          for i in $(seq 1 150); do
            echo "[check $i] scanning..."

            # tunnel address
            ADDR=$(grep -oE '[a-zA-Z0-9.-]+\.playit\.gg:[0-9]+' playit.log | tail -n 1 || true)

            # claim link (only first-time setup)
            CLAIM=$(grep -oE 'https://playit.gg/claim/[a-zA-Z0-9\-]+' playit.log | tail -n 1 || true)

            if [ ! -z "$ADDR" ]; then
              echo ""
              echo "================ PLAYIT READY ================"
              echo "SERVER ADDRESS: $ADDR"
              echo "=============================================="
              break
            fi

            if [ ! -z "$CLAIM" ]; then
              echo ""
              echo "================ CLAIM LINK ================"
              echo "$CLAIM"
              echo "==========================================="
            fi

            sleep 2
          done

          echo "================ FULL PLAYIT LOG DUMP ================"
          cat playit.log || true

          kill $LOGPID || true

      # ===================== DOWNLOAD PAPER =====================
      - name: Download PaperMC
        run: |
          echo "Downloading PaperMC..."

          curl -L -o paper.jar https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/latest/downloads/paper-1.21.4-latest.jar

          ls -lah

      # ===================== ACCEPT EULA =====================
      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      # ===================== RUN SERVER (FULL CONSOLE MIRROR) =====================
      - name: Run Minecraft Server
        run: |
          echo "================ MINECRAFT STARTING ================"

          java -Xms2G -Xmx4G -jar paper.jar --nogui 2>&1 | tee mc.log
