name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      # ===================== CHECKOUT =====================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===================== SYSTEM INFO LOGGING =====================
      - name: System Debug Info (FULL OUTPUT)
        run: |
          echo "================ SYSTEM INFO ================"
          uname -a
          lsb_release -a || true
          df -h
          free -m
          echo "============================================="

      # ===================== JAVA INSTALL =====================
      - name: Install Java
        run: |
          sudo apt update
          sudo apt install -y openjdk-21-jre

          echo "================ JAVA VERSION ================"
          java -version
          echo "============================================="

      # ===================== PLAYIT INSTALL =====================
      - name: Install Playit.gg
        run: |
          sudo apt update
          sudo apt install -y curl gnupg

          curl -SsL https://playit-cloud.github.io/ppa/key.gpg \
            | gpg --dearmor \
            | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null

          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" \
            | sudo tee /etc/apt/sources.list.d/playit-cloud.list

          sudo apt update
          sudo apt install -y playit

          echo "================ PLAYIT VERSION ================"
          playit --version || true
          echo "==============================================="

      # ===================== START PLAYIT (FULL LOG DUMP) =====================
      - name: Start Playit (FULL DEBUG MODE)
        run: |
          echo "================ PLAYIT START ================"

          # systemd already installed service → use it properly
          sudo systemctl enable playit || true
          sudo systemctl restart playit || true

          sleep 5

          echo "PLAYIT SERVICE STATUS:"
          systemctl status playit --no-pager || true

          echo "REALTIME LOG STREAM:"
          sudo journalctl -u playit -f --no-pager > playit.log 2>&1 &
          LOGPID=$!

          echo "Waiting for tunnel output..."

          for i in $(seq 1 120); do
            echo "[check $i] scanning logs..."

            # tunnel address
            ADDR=$(grep -oE '[a-zA-Z0-9.-]+\.playit\.gg:[0-9]+' playit.log | tail -n 1 || true)

            # claim (only first-time setups)
            CLAIM=$(grep -oE 'https://playit.gg/claim/[a-zA-Z0-9\-]+' playit.log | tail -n 1 || true)

            if [ ! -z "$ADDR" ]; then
              echo ""
              echo "================ PLAYIT READY ================"
              echo "SERVER ADDRESS: $ADDR"
              echo "=============================================="
              break
            fi

            if [ ! -z "$CLAIM" ]; then
              echo ""
              echo "================ CLAIM LINK ================"
              echo "$CLAIM"
              echo "==========================================="
            fi

            sleep 2
          done

          echo "================ FULL PLAYIT LOG ================"
          cat playit.log || true
          echo "================================================="

          kill $LOGPID || true

      # ===================== EULA =====================
      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      # ===================== DOWNLOAD PAPER =====================
      - name: Download PaperMC
        run: |
          echo "Downloading PaperMC..."

          curl -L -o paper.jar https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/latest/downloads/paper-1.21.4-latest.jar

          ls -lah

      # ===================== RUN SERVER =====================
      - name: Run Minecraft Server (FULL OUTPUT)
        run: |
          echo "================ STARTING SERVER ================"

          java -Xms2G -Xmx4G -jar paper.jar --nogui
