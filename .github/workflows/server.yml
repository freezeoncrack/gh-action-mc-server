name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      # ===================== CHECKOUT =====================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===================== INSTALL JAVA 25 =====================
      - name: Install JDK 25
        run: |
          sudo apt update
          sudo apt install -y wget gnupg curl procps

          echo "Downloading JDK 25..."
          wget -O jdk25.deb https://download.oracle.com/java/25/latest/jdk-25_linux-x64_bin.deb

          sudo apt install -y ./jdk25.deb
          rm jdk25.deb

          java -version

      # ===================== INSTALL NGROK =====================
      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null

          echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list >/dev/null

          sudo apt update
          sudo apt install -y ngrok

      # ===================== CONFIG NGROK =====================
      - name: Configure ngrok
        run: ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      # ===================== MINECRAFT EULA =====================
      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      # ===================== NGROK AUTO-RETRY + DEBUG =====================
      - name: Start ngrok tunnel (RETRY + DEBUG)
        run: |
          echo "================ NGROK AUTO START ================"

          ATTEMPT=0

          while true; do
            ATTEMPT=$((ATTEMPT+1))

            echo ""
            echo ">>> Attempt $ATTEMPT starting ngrok..."

            pkill ngrok || true
            nohup ngrok tcp 25565 > ngrok.log 2>&1 &

            for i in $(seq 1 15); do
              echo "[attempt $ATTEMPT | second $i] checking ngrok..."

              RAW=$(curl -s http://127.0.0.1:4040/api/tunnels || true)
              echo "[debug raw] $RAW"

              URL=$(echo "$RAW" \
                | grep -o '"public_url":"[^"]*' \
                | head -n 1 \
                | cut -d'"' -f4 || true)

              if [ ! -z "$URL" ]; then
                echo ""
                echo "================ NGROK READY ================"
                echo "SERVER ADDRESS: $URL"
                echo "============================================="
                break 2
              fi

              sleep 1
            done

            echo ">>> Attempt $ATTEMPT failed, retrying in 15s..."
            echo "Last logs:"
            tail -n 20 ngrok.log || true

            sleep 15
          done

      # ===================== RUN PAPER =====================
      - name: Run PaperMC Server
        run: |
          export JAVA_HOME=/usr/lib/jvm/jdk-25.0.3-oracle-x64
          export PATH=$JAVA_HOME/bin:$PATH

          java -version

          java -Xms2G -Xmx4G -jar paper.jar --nogui
