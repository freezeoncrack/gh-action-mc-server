name: Minecraft Server

on:
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest

    steps:

      # ===================== CHECKOUT =====================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ===================== JAVA =====================
      - name: Install Java
        run: |
          sudo apt update
          sudo apt install -y openjdk-21-jre

          java -version

      # ===================== PLAYIT INSTALL =====================
      - name: Install Playit
        run: |
          sudo apt update
          sudo apt install -y curl gnupg

          curl -SsL https://playit-cloud.github.io/ppa/key.gpg \
            | gpg --dearmor \
            | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null

          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" \
            | sudo tee /etc/apt/sources.list.d/playit-cloud.list

          sudo apt update
          sudo apt install -y playit

      # ===================== START PLAYIT (FIXED + RELIABLE) =====================
      - name: Start Playit Tunnel
        run: |
          echo "Starting Playit..."

          sudo systemctl restart playit
          sleep 10

          echo "PLAYIT STATUS:"
          systemctl status playit --no-pager || true

          echo "WAITING FOR TUNNEL..."

          for i in $(seq 1 180); do
            echo "[check $i] scanning..."

            # ONLY real tunnel output from journal
            ADDR=$(sudo journalctl -u playit --no-pager | grep -oE '[a-zA-Z0-9.-]+\.playit\.gg:[0-9]+' | tail -n 1 || true)

            if [ ! -z "$ADDR" ]; then
              echo ""
              echo "================ PLAYIT READY ================"
              echo "SERVER ADDRESS: $ADDR"
              echo "=============================================="
              break
            fi

            sleep 2
          done

      # ===================== EULA =====================
      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      # ===================== RUN SERVER (YOUR PREINSTALLED JAR) =====================
      - name: Run Minecraft Server
        run: |
          echo "Starting Minecraft Server..."

          if [ ! -f paper.jar ]; then
            echo "paper.jar not found in repo"
            ls -lah
            exit 1
          fi

          java -Xms2G -Xmx4G -jar paper.jar --nogui
